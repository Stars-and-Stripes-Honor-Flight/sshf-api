FlightDetailResult:
  type: object
  description: Flight detail data including flight info, statistics, and seat/bus assignments
  properties:
    flight:
      type: object
      description: Flight metadata
      properties:
        id:
          type: string
          description: Flight document ID
        name:
          type: string
          description: Flight name
        capacity:
          type: integer
          description: Flight capacity
        flight_date:
          type: string
          format: date
          description: Flight date in YYYY-MM-DD format
    stats:
      type: object
      description: Statistics for the flight
      properties:
        buses:
          type: object
          description: Count of people per bus
          properties:
            None:
              type: integer
            Alpha1:
              type: integer
            Alpha2:
              type: integer
            Alpha3:
              type: integer
            Alpha4:
              type: integer
            Alpha5:
              type: integer
            Bravo1:
              type: integer
            Bravo2:
              type: integer
            Bravo3:
              type: integer
            Bravo4:
              type: integer
            Bravo5:
              type: integer
        tours:
          type: object
          description: Count of people per tour (Alpha = Alpha1-5, Bravo = Bravo1-5)
          properties:
            Alpha:
              type: integer
            Bravo:
              type: integer
            None:
              type: integer
        flight:
          type: object
          description: Count of people per tour excluding nofly entries
          properties:
            Alpha:
              type: integer
            Bravo:
              type: integer
            None:
              type: integer
    pairs:
      type: array
      description: List of veteran-guardian pairs with seat/bus assignments
      items:
        $ref: '#/components/schemas/FlightDetailPair'

FlightDetailPair:
  type: object
  description: A veteran-guardian pairing with mismatch detection
  properties:
    pairId:
      type: string
      description: Unique identifier for the pair (veteran's ID or guardian's ID if unpaired)
    busMismatch:
      type: boolean
      description: True if people in the pair have different bus assignments
    missingPairedPerson:
      type: boolean
      description: True if a paired person is not on this flight
    people:
      type: array
      description: List of people in the pair (veteran and/or guardian)
      items:
        $ref: '#/components/schemas/FlightDetailPerson'

FlightDetailPerson:
  type: object
  description: An individual person (veteran or guardian) in the flight detail
  properties:
    type:
      type: string
      enum: [Veteran, Guardian]
      description: Person type
    id:
      type: string
      description: Document ID
    name_first:
      type: string
      description: First name
    name_last:
      type: string
      description: Last name
    name_middle:
      type: string
      description: Middle name
    birth_date:
      type: string
      description: Birth date
    gender:
      type: string
      description: Gender
    city:
      type: string
      description: City and state
    phone_mbl:
      type: string
      description: Mobile phone number
    bus:
      type: string
      enum: [None, Alpha1, Alpha2, Alpha3, Alpha4, Alpha5, Bravo1, Bravo2, Bravo3, Bravo4, Bravo5]
      description: Bus assignment
    seat:
      type: string
      description: Seat assignment (e.g., "14A")
    shirt:
      type: string
      description: Shirt size
    fm_number:
      type: string
      maxLength: 5
      description: Optional family member hold for application identifier, often blank
    assigned_to:
      type: string
      description: Assigned caller or coordinator name
    nofly:
      type: boolean
      description: Whether person is marked as no-fly
    confirmed:
      type: boolean
      description: Whether person is confirmed for the flight
    medical_form:
      type: boolean
      description: Whether medical form is received
    medical_level:
      type: string
      description: Medical level
    flight_vaccinated:
      type: boolean
      description: Whether person is marked as vaccinated for flight
    apparel_shirt_size:
      type: string
      description: Apparel shirt size
    apparel_jacket_size:
      type: string
      description: Apparel jacket size
    apparel_notes:
      type: string
      description: Apparel notes
    med_limits:
      type: string
      description: Medical limitations (Veterans only)
    group:
      type: string
      description: Group name (Veterans only)
    med_exprnc:
      type: string
      description: Medical experience (Guardians only)
    training:
      type: string
      description: Training status (Guardians only)
    training_complete:
      type: boolean
      description: Whether training is complete (Guardians only)
    mail_call_received:
      type: boolean
      description: Mail call received (Veterans only)
    mail_call_adopt:
      type: boolean
      description: Mail call adopt flag (Veterans only)
    mail_call_notes:
      type: string
      description: Mail call notes (Veterans only)
    medical_alt_level:
      type: string
      description: Alternate medical level (Veterans only)
    medical_limitations:
      type: string
      description: Medical limitations detail (Veterans only)
    medical_review:
      type: string
      description: Medical review notes (Veterans only)
    medical_requires_oxygen:
      type: boolean
      description: Whether oxygen is required (Veterans only)
    homecoming_destination:
      type: string
      description: Homecoming destination (Veterans only)
    flight_training_notes:
      type: string
      description: Training notes (Guardians only)
    flight_waiver:
      type: boolean
      description: Flight waiver flag (Guardians only)
    flight_training_see_doc:
      type: boolean
      description: Training see doctor flag (Guardians only)
    flight_paid:
      type: boolean
      description: Flight paid flag (Guardians only)
    flight_books_ordered:
      type: integer
      description: Number of books ordered (Guardians only)
